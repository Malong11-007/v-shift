name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  checks: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:ci

      - name: Prepare Vitest result artifact path
        if: always()
        run: |
          mkdir -p test-results/vitest
          if [ -f vitest-results.json ]; then
            mv vitest-results.json test-results/vitest/results.json
          fi
          if [ -f vitest-results.xml ]; then
            mv vitest-results.xml test-results/vitest/results.xml
          fi

      - name: Report Vitest results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unit Tests
          path: test-results/vitest/results.xml
          reporter: jest-junit
          fail-on-error: false

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 4

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 4
